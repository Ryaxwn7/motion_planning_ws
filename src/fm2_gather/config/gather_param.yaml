robot_ids: [1,2,3,4]
num_robots: 4
robot_weights: [1,1,1,1]
auto_detect_robots: true
robot_namespace_prefix: "robot"
robot_detect_topic_suffix: "/odom_combined"
robot_odom_topic_suffix: "/odom_combined"
robot_detect_timeout: 8.0
dominantrate: 0.01
hypo : 0.45
mission: "fastest" # "fastest" / "energy" / "space"
v_max: 1.0   
velocity_alpha: 0.2
velocity_dmax: 0.5
robot_radius: 0.25
velocity_mode: 1  # 0: linear  1: sigmoid
velocity_sigmoid_k: 1.5
velocity_sigmoid_b: 0.0
space_inflation_radius: 0.02
gather_radius: -1.0
goal_occupied_staging_radius: -1.0   # <=0 auto uses gather radius / hypo + margin
goal_occupied_staging_margin: 0.25
publish_center_goal_only: true
gather_center_topic: "/gather_center"
external_center_goal_topic: "/shape_assembly/center_goal_cmd"
external_center_sync_wait: 0.5
debug_on: false
plot_on: false
use_combined_map: false
combined_map_topic: "/combined_map"
base_map_topic: "/map"
use_dynamic_obstacle_planning_grid: false
use_dynamic_obstacle_velocity_layer: true
dynamic_obstacle_topic_suffix: "move_base/local_costmap/costmap"
dynamic_obstacle_threshold: 80
dynamic_obstacle_unknown_is_obstacle: false
dynamic_obstacle_timeout: 1.0
dynamic_obstacle_inflation_radius: 0.2
dynamic_obstacle_uncertainty_radius: 0.6
dynamic_obstacle_self_ignore_radius: 0.25
dynamic_obstacle_ignore_swarm_robots: true
dynamic_obstacle_swarm_ignore_radius: 0.35
dynamic_obstacle_stride: 1
dynamic_obstacle_max_samples: 800
use_peer_robot_uncertainty_layer: false
peer_robot_hard_radius: 0.2
peer_robot_uncertainty_radius: 0.6
peer_robot_speed_radius_gain: 0.3
peer_robot_uncertainty_max_radius: 1.2
peer_robot_speed_filter_alpha: 0.35
publish_velocity_maps: false
velocity_map_topic_prefix: "/fm2_gather/velocity_map"
publish_arrival_time_maps: false
arrival_time_topic_prefix: "/fm2_gather/arrival_time"
background_map_topic: "/map"
robot_costmap_topic_suffix: "move_base/global_costmap/costmap"
robot_costmap_update_topic_suffix: "move_base/global_costmap/costmap_updates"
map_combine_obstacle_threshold: 80
map_combine_unknown_is_obstacle: false
map_combine_costmap_timeout: 1.0
map_combine_robot_clear_radius: 0.35
map_combine_robot_clear_history_size: 5
map_combine_rate: 10.0
publish_combined_occupancy: false
combined_occupancy_topic: "/combined_map_occ"
