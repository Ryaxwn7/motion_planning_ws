#For Ros_Motion_Planning Pack
global_costmap:
  global_frame: map
  robot_base_frame: base_footprint

  robot_radius: 0.15


  update_frequency: 1.5
  publish_frequency: 1.5
  transform_tolerance: 0.5
  cost_scaling_factor: 1.5
  inflation_radius: 0.3

  ### Sensor management parameters ###
  obstacle_layer:
    observation_sources: scan scan2 scan3
    scan:
      {
        topic: scan,
        sensor_frame: laser,
        observation_persistence: 0.0,
        expected_update_rate: 2,
        data_type: LaserScan,
        clearing: true,
        marking: true,
        max_obstacle_height: 2.0,
        min_obstacle_height: 0.0,
        obstacle_range: 2.5,
        raytrace_range: 3.0,
        inf_is_valid: true,
      }
    scan2:
      {
        topic: scan2,
        sensor_frame: laser2,
        observation_persistence: 0.0,
        expected_update_rate: 0.15,
        data_type: LaserScan,
        clearing: true,
        marking: true,
        max_obstacle_height: 0.8,
        min_obstacle_height: 0.0,
        obstacle_range: 3.0,
        raytrace_range: 3.0,
        inf_is_valid: true,
      }
    scan3:
      {
        topic: scan3,
        sensor_frame: laser3,
        observation_persistence: 0.0,
        expected_update_rate: 0.15,
        data_type: LaserScan,
        clearing: true,
        marking: true,
        max_obstacle_height: 0.8,
        min_obstacle_height: 0.0,
        obstacle_range: 3.0,
        raytrace_range: 3.0,
        inf_is_valid: true,
      }

  inflation_layer:
    enabled: true
    cost_scaling_factor: 1.5 # exponential rate at which the obstacle cost drops off (default: 10)
    inflation_radius: 0.3 # max. distance from an obstacle at which costs are incurred for planning paths.

  static_map:
    enabled: true
    clear_time: 1.0
    publish_static_map: true
