#!/usr/bin/env python

PACKAGE = "graph_planner"
from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("v_max", double_t, 0, "Maximum velocity scale for FM2", 1.0, 0.0, 5.0)
gen.add("velocity_alpha", double_t, 0, "Linear velocity alpha (0-1)", 0.2, 0.0, 1.0)
gen.add("velocity_dmax", double_t, 0, "Velocity saturation distance (0=auto)", 0.0, 0.0, 5.0)
gen.add("robot_radius", double_t, 0, "Robot radius used in velocity field", 0.0, 0.0, 3.0)
gen.add("velocity_mode", int_t, 0, "Velocity mapping mode (0=linear, 1=sigmoid)", 0, 0, 1)
gen.add("velocity_sigmoid_k", double_t, 0, "Sigmoid k parameter", 0.15, 0.0, 10.0)
gen.add("velocity_sigmoid_b", double_t, 0, "Sigmoid b parameter", 0.0, 0.0, 10.0)
gen.add("use_gather_style", bool_t, 0, "Use gather-style FM2 compute", True)
gen.add("use_star_heuristic", bool_t, 0, "Enable FM2* heuristic (false matches FM2 time field)", True)
gen.add("use_dynamic_obstacle_uncertainty", bool_t, 0, "Apply dynamic obstacle uncertainty on velocity map", True)
gen.add("use_dynamic_obstacle_cluster_tracking", bool_t, 0, "Cluster dynamic obstacles and track centers before injecting uncertainty", True)
gen.add("force_full_occupancy_refresh", bool_t, 0, "Force occupancy rebuild and base-velocity recompute every planning call", False)
gen.add("dynamic_obstacle_threshold", int_t, 0, "Obstacle threshold from obstacle layer cost", 253, 0, 255)
gen.add("dynamic_obstacle_unknown_is_obstacle", bool_t, 0, "Treat NO_INFORMATION as dynamic obstacle", False)
gen.add("dynamic_obstacle_inflation_radius", double_t, 0, "Hard-core uncertainty radius (m)", 0.2, 0.0, 5.0)
gen.add("dynamic_obstacle_uncertainty_radius", double_t, 0, "Soft uncertainty radius (m)", 0.6, 0.0, 10.0)
gen.add("dynamic_obstacle_stride", int_t, 0, "Stride for obstacle-layer sampling", 1, 1, 20)
gen.add("dynamic_obstacle_cluster_min_cells", int_t, 0, "Minimum cells per dynamic-obstacle cluster", 2, 1, 200)
gen.add("dynamic_obstacle_track_match_radius", double_t, 0, "Track association radius for dynamic obstacles (m)", 0.5, 0.0, 5.0)
gen.add("dynamic_obstacle_track_ttl", double_t, 0, "How long to keep unseen dynamic-obstacle tracks (s)", 0.6, 0.0, 10.0)
gen.add("static_obstacle_noise_reject_cells", int_t, 0, "Reject dynamic-obstacle samples near static obstacles (cells)", 4, 0, 50)
gen.add("dynamic_obstacle_max_samples", int_t, 0, "Max sampled dynamic obstacles per planning", 800, 1, 20000)

gen.add("debug_velocity_path", str_t, 0, "Path for velocity map CSV", "/tmp/fm2_velocity.csv")
gen.add("debug_dump_velocity", bool_t, 0, "Dump velocity map to debug_velocity_path", False)
gen.add("debug_visualize", bool_t, 0, "Visualize maps with CImg windows", False)
gen.add("debug_log", bool_t, 0, "Enable verbose FM2 logs", False)

gen.add("restore_defaults", bool_t, 0, "Restore default parameters", False)

exit(gen.generate(PACKAGE, "graph_planner", "FM2Planner"))
